<!--
  ===============================================================
  Página de ubicación de entrega — CLOUD
  ===============================================================
-->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLOUD — ¿Óntas?</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <script>const MAPBOX_TOKEN = 'MAPBOX_TOKEN_HERE';</script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { width: 100%; font-family: 'Nunito', sans-serif; overflow-x: hidden; min-height: 100vh; }

    /* ── FIXED SKY ── */
    .sky {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(180deg, #0d6db5 0%, #1a8fd4 25%, #36b0f4 55%, #6dcaf8 80%, #a8e0ff 100%);
    }
    .sky::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 120% 55% at 50% 85%, rgba(255,255,255,0.18) 0%, transparent 70%);
    }

    /* ── FIXED CLOUDS ── */
    .clouds-layer { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .cloud { position: absolute; filter: drop-shadow(0 8px 24px rgba(255,255,255,0.45)); }
    .cloud svg { display: block; }

    @keyframes sway {
      0%   { transform: translateX(var(--from)) translateY(0px); }
      50%  { transform: translateX(var(--to))   translateY(var(--bob)); }
      100% { transform: translateX(var(--from)) translateY(0px); }
    }

    .c1 { top:-2%; left:50%; margin-left:clamp(-260px,-16vw,-140px); width:clamp(280px,32vw,520px); --from:-18vw; --to:18vw; --bob:-12px; animation:sway 18s ease-in-out 0s infinite; }
    .c2 { bottom:5%; left:2%; width:clamp(200px,26vw,400px); --from:0vw; --to:22vw; --bob:-10px; animation:sway 22s ease-in-out 2s infinite; }
    .c3 { bottom:2%; right:2%; width:clamp(220px,28vw,430px); --from:0vw; --to:-20vw; --bob:-8px; animation:sway 25s ease-in-out 1s infinite; }
    .c4 { top:32%; left:5%; width:clamp(160px,20vw,300px); --from:0vw; --to:28vw; --bob:-14px; animation:sway 30s ease-in-out 4s infinite; }
    .c5 { top:50%; right:5%; width:clamp(180px,22vw,340px); --from:0vw; --to:-25vw; --bob:-10px; animation:sway 28s ease-in-out 6s infinite; }
    .c6 { top:12%; right:6%; width:clamp(140px,18vw,260px); --from:0vw; --to:-16vw; --bob:-8px; animation:sway 20s ease-in-out 3s infinite; }

    /* ── SCROLLABLE PAGE ── */
    .page { position: relative; z-index: 10; }

    /* ── KEYFRAMES ── */
    @keyframes letter-pop {
      0%   { opacity:0; transform:translateY(80px) scale(0.5) rotate(-8deg); filter:blur(10px); }
      70%  { opacity:1; filter:blur(0); transform:translateY(-12px) scale(1.08) rotate(1deg); }
      100% { opacity:1; transform:translateY(0) scale(1) rotate(0deg); filter:blur(0); }
    }
    @keyframes fade-up {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── 3D TEXT ── */
    .text-3d {
      display: inline-block; font-weight: 900; line-height: 1;
      letter-spacing: -0.02em; color: #fff;
      text-shadow:
        0  2px 0 #a8d8f8,
        0  4px 0 #7ec0f0,
        0  6px 0 #55a8e8,
        0  8px 0 #2c90d8,
        0 10px 0 #0a78c8,
        0 12px 0 #0060b0,
        0 14px 0 #004898,
        0 20px 10px rgba(0,40,110,0.35),
        0 30px 30px rgba(0,40,110,0.22),
        0 40px 60px rgba(0,40,110,0.14);
      -webkit-text-stroke: 2px rgba(255,255,255,0.2);
    }

    /* ── ONTAS LETTERS ── */
    .oletter {
      display: inline-block; opacity: 0;
      animation: letter-pop 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
      font-size: clamp(70px, 16vw, 200px);
    }
    .ol1 { animation-delay: 0.10s; }
    .ol2 { animation-delay: 0.22s; }
    .ol3 { animation-delay: 0.34s; }
    .ol4 { animation-delay: 0.46s; }
    .ol5 { animation-delay: 0.58s; }
    .ol6 { animation-delay: 0.70s; }

    /* ── HERO SECTION ── */
    .hero {
      min-height: 50vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 20px 30px;
    }
    .subtitle {
      opacity:0; animation:fade-up 0.8s ease 1.2s forwards;
      font-size: clamp(13px,2vw,22px); font-weight:900;
      color: #fff; letter-spacing:0.35em; text-transform:uppercase;
      text-shadow: 0 1px 12px rgba(0,50,140,0.6);
      margin-top:8px;
    }

    /* ── MAP SECTION ── */
    .map-section {
      display: flex; flex-direction: column;
      align-items: center;
      padding: 0 20px 60px;
      gap: 14px;
    }

    .hint {
      width: min(580px, 92vw);
      background: rgba(0,30,80,0.52);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(255,255,255,0.28);
      border-radius: 14px;
      padding: 13px 20px;
      color: #c8e8ff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-align: center;
    }

    .map-wrap {
      position: relative;
      width: min(580px, 92vw);
    }
    #map {
      width: 100%;
      height: 58vw;
      max-height: 420px;
      min-height: 260px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.45);
      border: 1.5px solid rgba(255,255,255,0.25);
    }
    .pin-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -100%);
      font-size: 38px;
      pointer-events: none;
      z-index: 10;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.45));
      transition: transform 0.15s ease;
    }
    .pin-center.dragging {
      transform: translate(-50%, -118%) scale(1.18);
    }

    /* ── COORDS ── */
    .coords {
      width: min(580px, 92vw);
      background: rgba(0,25,75,0.60);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1.5px solid rgba(255,255,255,0.22);
      border-radius: 12px;
      padding: 12px 18px;
      color: #7ab8ff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
    }

    /* ── BACK BUTTON ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(0,25,75,0.55);
      backdrop-filter: blur(12px);
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 40px; padding: 10px 24px;
      color: #fff; font-family:'Nunito',sans-serif;
      font-size: 15px; font-weight:900;
      text-decoration:none; cursor:pointer;
      letter-spacing:0.08em;
      transition: background 0.2s ease;
      align-self: flex-start;
    }
    .back-btn:hover { background: rgba(0,60,150,0.7); }

    /* ── WHATSAPP BUTTON ── */
    .wa-btn {
      width: min(580px, 92vw);
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: #25D366; border: none; border-radius: 50px;
      padding: 16px; color: #fff; font-family: 'Nunito', sans-serif;
      font-size: clamp(16px, 3vw, 20px); font-weight: 900;
      cursor: pointer; letter-spacing: 0.05em;
      box-shadow: 0 6px 28px rgba(37,211,102,0.45);
      transition: background 0.2s ease, transform 0.2s ease;
    }
    .wa-btn:hover { background: #1ebe5d; transform: translateY(-3px); }
    .wa-btn:disabled {
      background: rgba(0,25,75,0.4);
      box-shadow: none; cursor: default; transform: none; opacity: 0.5;
    }
  </style>
</head>
<body>

<!-- Fixed sky -->
<div class="sky"></div>

<!-- Fixed clouds -->
<div class="clouds-layer">
  <div class="cloud c1">
    <svg viewBox="0 0 520 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="cg1" cx="50%" cy="30%" r="60%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#dff0ff"/></radialGradient>
        <filter id="cf1" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/><feOffset dx="0" dy="8" result="shadow"/><feFlood flood-color="rgba(100,160,220,0.3)" result="color"/><feComposite in="color" in2="shadow" operator="in" result="shadow2"/><feMerge><feMergeNode in="shadow2"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <g filter="url(#cf1)">
        <ellipse cx="260" cy="170" rx="220" ry="60" fill="url(#cg1)"/>
        <circle cx="160" cy="140" r="75" fill="url(#cg1)"/><circle cx="260" cy="110" r="90" fill="url(#cg1)"/>
        <circle cx="370" cy="130" r="80" fill="url(#cg1)"/><circle cx="440" cy="160" r="55" fill="url(#cg1)"/>
        <circle cx="90" cy="165" r="50" fill="url(#cg1)"/>
        <ellipse cx="240" cy="95" rx="60" ry="25" fill="rgba(255,255,255,0.6)"/>
      </g>
    </svg>
  </div>
  <div class="cloud c2">
    <svg viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="cg2" cx="50%" cy="25%" r="65%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e4f3ff"/></radialGradient></defs>
      <ellipse cx="200" cy="145" rx="175" ry="45" fill="url(#cg2)"/>
      <circle cx="110" cy="115" r="62" fill="url(#cg2)"/><circle cx="200" cy="90" r="72" fill="url(#cg2)"/>
      <circle cx="295" cy="108" r="58" fill="url(#cg2)"/><circle cx="345" cy="135" r="40" fill="url(#cg2)"/>
      <circle cx="60" cy="138" r="38" fill="url(#cg2)"/>
    </svg>
  </div>
  <div class="cloud c3">
    <svg viewBox="0 0 460 200" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="cg3" cx="50%" cy="28%" r="62%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e0f0ff"/></radialGradient></defs>
      <ellipse cx="230" cy="160" rx="200" ry="52" fill="url(#cg3)"/>
      <circle cx="130" cy="128" r="70" fill="url(#cg3)"/><circle cx="235" cy="100" r="85" fill="url(#cg3)"/>
      <circle cx="340" cy="120" r="72" fill="url(#cg3)"/><circle cx="400" cy="150" r="50" fill="url(#cg3)"/>
    </svg>
  </div>
  <div class="cloud c4">
    <svg viewBox="0 0 300 140" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="cg4" cx="50%" cy="25%" r="65%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e8f5ff"/></radialGradient></defs>
      <ellipse cx="150" cy="115" rx="130" ry="35" fill="url(#cg4)"/>
      <circle cx="85" cy="90" r="48" fill="url(#cg4)"/><circle cx="150" cy="70" r="58" fill="url(#cg4)"/>
      <circle cx="220" cy="85" r="48" fill="url(#cg4)"/>
    </svg>
  </div>
  <div class="cloud c5">
    <svg viewBox="0 0 350 160" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="cg5" cx="50%" cy="28%" r="62%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e4f2ff"/></radialGradient></defs>
      <ellipse cx="175" cy="130" rx="155" ry="40" fill="url(#cg5)"/>
      <circle cx="100" cy="103" r="55" fill="url(#cg5)"/><circle cx="178" cy="80" r="66" fill="url(#cg5)"/>
      <circle cx="258" cy="98" r="54" fill="url(#cg5)"/>
    </svg>
  </div>
  <div class="cloud c6">
    <svg viewBox="0 0 260 130" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="cg6" cx="50%" cy="28%" r="65%"><stop offset="0%" stop-color="#ffffff"/><stop offset="100%" stop-color="#e8f6ff"/></radialGradient></defs>
      <ellipse cx="130" cy="105" rx="115" ry="32" fill="url(#cg6)"/>
      <circle cx="75" cy="83" r="44" fill="url(#cg6)"/><circle cx="132" cy="63" r="54" fill="url(#cg6)"/>
      <circle cx="192" cy="78" r="44" fill="url(#cg6)"/>
    </svg>
  </div>
</div>

<!-- Scrollable content -->
<div class="page">

  <!-- ══ HERO ══ -->
  <section class="hero">
    <div aria-label="ÓNTAS?" style="white-space:nowrap;">
      <span class="oletter text-3d ol1">¿</span><span class="oletter text-3d ol2">Ó</span><span class="oletter text-3d ol3">n</span><span class="oletter text-3d ol4">t</span><span class="oletter text-3d ol5">a</span><span class="oletter text-3d ol6">s</span><span class="oletter text-3d" style="animation-delay:0.82s;">?</span>
    </div>
    <div class="subtitle">✦ manda tu ubicación ✦</div>
  </section>

  <!-- ══ MAP ══ -->
  <div class="map-section">
    <a class="back-btn" href="index.html">← volver</a>

    <p class="hint">mueve el mapa hasta tu casa y toca <strong>enviar</strong></p>

    <div class="map-wrap">
      <div id="map"></div>
      <div class="pin-center" id="pinIcon">📍</div>
      <button id="locBtn" onclick="locateUser()" style="position:absolute;top:10px;right:10px;z-index:20;background:rgba(0,25,75,0.75);backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,0.3);border-radius:50px;padding:8px 16px;color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;cursor:pointer;letter-spacing:0.04em;">
        📍 mi ubicación
      </button>
    </div>

    <div class="coords" id="coordsLabel">mueve el mapa para fijar el pin</div>

    <button class="wa-btn" id="sendBtn" disabled>
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 32 32" fill="#fff">
        <path d="M16 3C8.832 3 3 8.832 3 16c0 2.566.742 4.958 2.031 6.984L3 29l6.188-1.984A13 13 0 0 0 16 29c7.168 0 13-5.832 13-13S23.168 3 16 3zm0 2c6.086 0 11 4.914 11 11s-4.914 11-11 11a11 11 0 0 1-5.5-1.484l-.39-.219-4.063 1.297 1.344-3.953-.234-.39A10.96 10.96 0 0 1 5 16C5 9.914 9.914 5 16 5zm-3.281 5.5c-.211 0-.543.078-.828.39-.285.313-1.094 1.063-1.094 2.594s1.118 3.008 1.274 3.22c.156.21 2.164 3.468 5.343 4.718.746.313 1.328.5 1.782.641.746.234 1.426.203 1.968.125.601-.086 1.848-.758 2.11-1.485.26-.726.26-1.35.18-1.484-.078-.133-.289-.211-.602-.367-.312-.156-1.847-.914-2.136-1.016-.289-.102-.5-.156-.71.157-.212.312-.82 1.015-1.008 1.226-.188.211-.375.235-.688.078-.312-.156-1.32-.485-2.515-1.547-.93-.828-1.554-1.852-1.738-2.164-.183-.313-.02-.48.137-.633.141-.14.313-.368.469-.547.156-.18.21-.313.313-.524.101-.21.05-.39-.024-.547-.079-.156-.711-1.715-.977-2.344-.257-.617-.52-.531-.71-.539-.188-.007-.4-.008-.61-.008z"/>
      </svg>
      enviar ubicación por whatsapp
    </button>
  </div>

</div><!-- end .page -->

<script>
  mapboxgl.accessToken = MAPBOX_TOKEN;

  const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/standard',
    center: [-97.5026, 25.8691],
    zoom: 14
  });

  map.on('load', () => {
    map.setConfigProperty('basemap', 'lightPreset', 'dusk');

    // marker fijo de la tienda
    new mapboxgl.Marker({ color: '#0a78c8' })
      .setLngLat([-97.5026, 25.8691])
      .setPopup(new mapboxgl.Popup().setText('cloud — tienda'))
      .addTo(map);

    // pedir ubicación automáticamente
    locateUser();
  });

  function locateUser() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        map.flyTo({ center: [pos.coords.longitude, pos.coords.latitude], zoom: 16, speed: 1.4 });
      },
      () => {} // si niega el permiso, queda en Matamoros
    );
  }

  const pinIcon  = document.getElementById('pinIcon');
  const coordsEl = document.getElementById('coordsLabel');
  const sendBtn  = document.getElementById('sendBtn');
  let currentCoords = null;

  map.on('move', () => pinIcon.classList.add('dragging'));

  map.on('moveend', () => {
    pinIcon.classList.remove('dragging');
    const { lng, lat } = map.getCenter();
    currentCoords = { lng: lng.toFixed(6), lat: lat.toFixed(6) };
    coordsEl.textContent = `📍 ${currentCoords.lat}, ${currentCoords.lng}`;
    sendBtn.disabled = false;
  });

  // leer items del carrito si vienen en la URL
  let cartItems = [];
  try {
    const raw = new URLSearchParams(location.search).get('items');
    if (raw) cartItems = JSON.parse(raw);
  } catch(e) {}

  sendBtn.addEventListener('click', () => {
    if (!currentCoords) return;
    const mapsLink = `https://maps.google.com/?q=${currentCoords.lat},${currentCoords.lng}`;
    let msg = '';
    if (cartItems.length) {
      cartItems.forEach(it => {
        msg += `- ${it.product.toLowerCase()} ${it.qty} $${Number(it.price).toLocaleString('es-MX')}\n`;
      });
      const total = cartItems.reduce((s, it) => s + Number(it.price), 0);
      msg += `total $${total.toLocaleString('es-MX')}\n`;
      msg += `mi ubi es: ${mapsLink}`;
    } else {
      msg = `mi ubi es: ${mapsLink}`;
    }
    window.open('https://wa.me/528683628730?text=' + encodeURIComponent(msg), '_blank');
  });
</script>

</body>
</html>
